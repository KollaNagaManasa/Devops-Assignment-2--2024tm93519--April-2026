apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      color: blue
  template:
    metadata:
      labels:
        app: aceest
        color: blue
    spec:
      containers:
        - name: aceest-fitness
          image: kollanagamanasa/aceest-fitness:v1
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      color: green
  template:
    metadata:
      labels:
        app: aceest
        color: green
    spec:
      containers:
        - name: aceest-fitness
          image: kollanagamanasa/aceest-fitness:v2
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-blue-green-service
  namespace: aceest
spec:
  selector:
    app: aceest
    color: blue
  ports:
    - port: 80
      targetPort: 5000
  type: NodePort
