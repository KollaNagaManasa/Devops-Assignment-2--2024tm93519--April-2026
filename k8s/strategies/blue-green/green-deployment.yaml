apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: green
  template:
    metadata:
      labels:
        app: aceest
        version: green
    spec:
      containers:
      - name: app
        image: kollanagamanasa/aceest-fitness:latest
        ports:
        - containerPort: 5000
