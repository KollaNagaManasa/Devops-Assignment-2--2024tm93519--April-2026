apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest
      track: stable
  template:
    metadata:
      labels:
        app: aceest
        track: stable
    spec:
      containers:
        - name: aceest-fitness
          image: your-dockerhub-username/aceest-fitness:v1
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      track: canary
  template:
    metadata:
      labels:
        app: aceest
        track: canary
    spec:
      containers:
        - name: aceest-fitness
          image: your-dockerhub-username/aceest-fitness:v2
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-service
  namespace: aceest
spec:
  selector:
    app: aceest
  ports:
    - port: 80
      targetPort: 5000
  type: NodePort
