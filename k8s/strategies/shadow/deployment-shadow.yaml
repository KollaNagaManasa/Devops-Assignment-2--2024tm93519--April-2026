apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-primary
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      role: primary
  template:
    metadata:
      labels:
        app: aceest
        role: primary
    spec:
      containers:
        - name: aceest-fitness
          image: kollanagamanasa/aceest-fitness:v1
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      role: shadow
  template:
    metadata:
      labels:
        app: aceest
        role: shadow
    spec:
      containers:
        - name: aceest-fitness
          image: kollanagamanasa/aceest-fitness:v2
          ports:
            - containerPort: 5000
