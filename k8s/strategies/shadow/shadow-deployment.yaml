apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-shadow
  template:
    metadata:
      labels:
        app: aceest-shadow
    spec:
      containers:
      - name: shadow
        image: kollanagamanasa/aceest-fitness:latest
        ports:
        - containerPort: 5000
