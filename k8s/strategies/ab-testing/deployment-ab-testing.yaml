apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-a
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      variant: a
  template:
    metadata:
      labels:
        app: aceest
        variant: a
    spec:
      containers:
        - name: aceest-fitness
          image: your-dockerhub-username/aceest-fitness:v1
          ports:
            - containerPort: 5000
---
