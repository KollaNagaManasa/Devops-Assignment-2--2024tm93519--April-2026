apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-b
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: b
  template:
    metadata:
      labels:
        app: aceest
        version: b
    spec:
      containers:
      - name: app
        image: kollanagamanasa/aceest-fitness:latest
        ports:
        - containerPort: 5000
